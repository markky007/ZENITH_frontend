<nav class="z-nav-menu" [class.z-nav-menu--disabled]="isDisabled()">
  <ul class="z-nav-menu__list">
    @for (item of internalItems(); track item.id) {
      <li 
        class="z-nav-menu__item" 
        [class.z-nav-menu__item--active]="activeId() === item.id"
      >
        
        <a 
          [routerLink]="item.link" 
          class="z-nav-menu__link"
          (click)="selectItem(item)"
          [attr.aria-current]="activeId() === item.id ? 'page' : null"
        >
          @if (item.icon) {
            <span class="z-nav-menu__icon" [innerHTML]="item.icon"></span>
          }
          <span class="z-nav-menu__label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</nav>
